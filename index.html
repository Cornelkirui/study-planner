<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner App</title>
  <!-- CSS link -->
  <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<body>

<div class="container" id="app-container">

  <h1 id="app-title" class="title">Study Planner App</h1>

  <form id="task-form" class="task-form">

    <input type="text" id="task-title" class="task-input" placeholder="Enter task title" required>

    <select id="task-priority" class="task-select">
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <input type="date" id="task-deadline" class="task-date">

    <button type="submit" id="add-task-btn" class="task-btn">Add Task</button>

  </form>

  <ul id="task-list" class="task-list">

</div>

</body>
</html>
